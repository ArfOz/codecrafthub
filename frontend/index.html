<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CodeCraftHub – Learning Dashboard</title>
  <style>
    /* ── Reset & base ───────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f0f2f5;
      color: #1e293b;
      min-height: 100vh;
    }

    /* ── Header ─────────────────────────────────────────── */
    header {
      background: #0f172a;
      color: #fff;
      padding: 0 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 64px;
      box-shadow: 0 2px 8px rgba(0,0,0,.4);
    }
    header h1 { font-size: 1.4rem; letter-spacing: .5px; }
    header h1 span { color: #38bdf8; }
    header p  { font-size: .85rem; color: #94a3b8; }

    /* ── Stats bar ──────────────────────────────────────── */
    .stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1rem;
      padding: 1.5rem 2rem;
      background: #1e293b;
    }
    .stat-card {
      background: #0f172a;
      border-radius: 10px;
      padding: 1rem 1.25rem;
      text-align: center;
      border: 1px solid #334155;
    }
    .stat-card .label { font-size: .75rem; color: #94a3b8; text-transform: uppercase; letter-spacing: .5px; }
    .stat-card .value { font-size: 2rem; font-weight: 700; margin-top: .25rem; }
    .stat-card.total   .value { color: #e2e8f0; }
    .stat-card.ns      .value { color: #94a3b8; }
    .stat-card.ip      .value { color: #38bdf8; }
    .stat-card.done    .value { color: #4ade80; }

    /* ── Main layout ────────────────────────────────────── */
    main { padding: 2rem; max-width: 1200px; margin: 0 auto; }

    /* ── Section headings ───────────────────────────────── */
    .section-title {
      font-size: 1.1rem;
      font-weight: 600;
      margin-bottom: 1rem;
      color: #0f172a;
      display: flex;
      align-items: center;
      gap: .5rem;
    }

    /* ── Add course form card ───────────────────────────── */
    .form-card {
      background: #fff;
      border-radius: 12px;
      padding: 1.5rem;
      box-shadow: 0 1px 4px rgba(0,0,0,.08);
      margin-bottom: 2rem;
    }
    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }
    .form-grid .full { grid-column: 1 / -1; }
    label { display: block; font-size: .8rem; font-weight: 600; color: #475569; margin-bottom: .3rem; }
    input[type="text"],
    input[type="date"],
    textarea,
    select {
      width: 100%;
      padding: .55rem .75rem;
      border: 1.5px solid #e2e8f0;
      border-radius: 8px;
      font-size: .9rem;
      color: #1e293b;
      background: #f8fafc;
      transition: border-color .2s;
      resize: vertical;
    }
    input:focus, textarea:focus, select:focus {
      outline: none;
      border-color: #38bdf8;
      background: #fff;
    }
    .form-actions { display: flex; gap: .75rem; justify-content: flex-end; margin-top: 1rem; }

    /* ── Buttons ────────────────────────────────────────── */
    button {
      cursor: pointer;
      border: none;
      border-radius: 8px;
      font-size: .875rem;
      font-weight: 600;
      padding: .55rem 1.2rem;
      transition: opacity .2s, transform .1s;
    }
    button:active { transform: scale(.97); }
    button:disabled { opacity: .5; cursor: not-allowed; }
    .btn-primary  { background: #0ea5e9; color: #fff; }
    .btn-primary:hover  { background: #0284c7; }
    .btn-secondary { background: #e2e8f0; color: #475569; }
    .btn-secondary:hover { background: #cbd5e1; }
    .btn-edit   { background: #f0f9ff; color: #0284c7; border: 1px solid #bae6fd; padding: .35rem .85rem; font-size: .8rem; }
    .btn-edit:hover { background: #e0f2fe; }
    .btn-delete { background: #fff1f2; color: #e11d48; border: 1px solid #fda4af; padding: .35rem .85rem; font-size: .8rem; }
    .btn-delete:hover { background: #ffe4e6; }
    .btn-save   { background: #4ade80; color: #14532d; padding: .35rem .85rem; font-size: .8rem; }
    .btn-save:hover { background: #22c55e; }
    .btn-cancel { background: #e2e8f0; color: #475569; padding: .35rem .75rem; font-size: .8rem; }

    /* ── Filter bar ─────────────────────────────────────── */
    .filter-bar {
      display: flex;
      gap: .5rem;
      margin-bottom: 1.25rem;
      flex-wrap: wrap;
      align-items: center;
    }
    .filter-bar span { font-size: .85rem; color: #64748b; margin-right: .25rem; }
    .filter-btn {
      padding: .4rem 1rem;
      border-radius: 20px;
      font-size: .8rem;
      font-weight: 600;
      border: 1.5px solid #e2e8f0;
      background: #fff;
      color: #64748b;
      cursor: pointer;
      transition: all .15s;
    }
    .filter-btn.active, .filter-btn:hover { border-color: #0ea5e9; color: #0ea5e9; background: #f0f9ff; }

    /* ── Course cards grid ──────────────────────────────── */
    .courses-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 1.25rem;
    }
    .course-card {
      background: #fff;
      border-radius: 12px;
      padding: 1.25rem;
      box-shadow: 0 1px 4px rgba(0,0,0,.08);
      border-left: 4px solid #e2e8f0;
      transition: box-shadow .2s;
      display: flex;
      flex-direction: column;
      gap: .75rem;
    }
    .course-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,.1); }
    .course-card.status-ns   { border-left-color: #94a3b8; }
    .course-card.status-ip   { border-left-color: #38bdf8; }
    .course-card.status-done { border-left-color: #4ade80; }

    .card-header { display: flex; justify-content: space-between; align-items: flex-start; gap: .5rem; }
    .card-header h3 { font-size: 1rem; font-weight: 700; color: #0f172a; line-height: 1.3; }

    /* ── Status badges ──────────────────────────────────── */
    .badge {
      font-size: .7rem;
      font-weight: 700;
      padding: .25rem .6rem;
      border-radius: 20px;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .badge-ns   { background: #f1f5f9; color: #64748b; }
    .badge-ip   { background: #e0f2fe; color: #0284c7; }
    .badge-done { background: #dcfce7; color: #16a34a; }

    .card-desc { font-size: .85rem; color: #64748b; line-height: 1.5; }
    .card-meta { font-size: .78rem; color: #94a3b8; }
    .card-meta strong { color: #64748b; }
    .card-actions { display: flex; gap: .5rem; justify-content: flex-end; margin-top: auto; }

    /* ── Inline edit form ───────────────────────────────── */
    .inline-edit {
      background: #f8fafc;
      border: 1.5px solid #e0f2fe;
      border-radius: 10px;
      padding: 1rem;
      display: flex;
      flex-direction: column;
      gap: .65rem;
    }
    .inline-edit input,
    .inline-edit textarea,
    .inline-edit select { font-size: .85rem; padding: .45rem .65rem; }
    .inline-edit-actions { display: flex; gap: .5rem; justify-content: flex-end; }

    /* ── Empty & loading states ─────────────────────────── */
    .empty-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 3rem;
      color: #94a3b8;
    }
    .empty-state .icon { font-size: 3rem; margin-bottom: .75rem; }
    .empty-state p { font-size: .95rem; }

    .spinner {
      grid-column: 1 / -1;
      text-align: center;
      padding: 3rem;
      color: #94a3b8;
      font-size: .95rem;
    }

    /* ── Toast notifications ────────────────────────────── */
    #toast-container {
      position: fixed;
      bottom: 1.5rem;
      right: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: .5rem;
      z-index: 1000;
    }
    .toast {
      padding: .75rem 1.25rem;
      border-radius: 10px;
      font-size: .875rem;
      font-weight: 600;
      color: #fff;
      box-shadow: 0 4px 12px rgba(0,0,0,.2);
      animation: slideIn .25s ease;
    }
    .toast-success { background: #16a34a; }
    .toast-error   { background: #e11d48; }
    @keyframes slideIn { from { transform: translateX(120%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

    /* ── Responsive ─────────────────────────────────────── */
    @media (max-width: 640px) {
      .stats       { grid-template-columns: repeat(2, 1fr); padding: 1rem; }
      .form-grid   { grid-template-columns: 1fr; }
      .form-grid .full { grid-column: 1; }
      main         { padding: 1rem; }
    }
  </style>
</head>
<body>

<!-- ── Header ──────────────────────────────────────────────── -->
<header>
  <h1>Code<span>Craft</span>Hub</h1>
  <p>Personal Learning Tracker</p>
</header>

<!-- ── Stats bar ───────────────────────────────────────────── -->
<div class="stats">
  <div class="stat-card total">
    <div class="label">Total Courses</div>
    <div class="value" id="stat-total">–</div>
  </div>
  <div class="stat-card ns">
    <div class="label">Not Started</div>
    <div class="value" id="stat-ns">–</div>
  </div>
  <div class="stat-card ip">
    <div class="label">In Progress</div>
    <div class="value" id="stat-ip">–</div>
  </div>
  <div class="stat-card done">
    <div class="label">Completed</div>
    <div class="value" id="stat-done">–</div>
  </div>
</div>

<!-- ── Main content ─────────────────────────────────────────── -->
<main>

  <!-- Add Course Form -->
  <div class="form-card">
    <div class="section-title">➕ Add New Course</div>
    <form id="add-form">
      <div class="form-grid">
        <div>
          <label for="f-name">Course Name *</label>
          <input type="text" id="f-name" placeholder="e.g. Python Basics" required />
        </div>
        <div>
          <label for="f-date">Target Date *</label>
          <input type="date" id="f-date" required />
        </div>
        <div class="full">
          <label for="f-desc">Description *</label>
          <textarea id="f-desc" rows="2" placeholder="What will you learn?" required></textarea>
        </div>
        <div>
          <label for="f-status">Status</label>
          <select id="f-status">
            <option value="Not Started">Not Started</option>
            <option value="In Progress">In Progress</option>
            <option value="Completed">Completed</option>
          </select>
        </div>
        <div class="form-actions">
          <button type="button" class="btn-secondary" onclick="resetForm()">Clear</button>
          <button type="submit" class="btn-primary" id="submit-btn">Add Course</button>
        </div>
      </div>
    </form>
  </div>

  <!-- Course list -->
  <div class="section-title">📚 My Courses</div>

  <!-- Filter bar -->
  <div class="filter-bar">
    <span>Filter:</span>
    <button class="filter-btn active" data-filter="All"          onclick="setFilter(this)">All</button>
    <button class="filter-btn"        data-filter="Not Started"  onclick="setFilter(this)">Not Started</button>
    <button class="filter-btn"        data-filter="In Progress"  onclick="setFilter(this)">In Progress</button>
    <button class="filter-btn"        data-filter="Completed"    onclick="setFilter(this)">Completed</button>
  </div>

  <!-- Cards -->
  <div class="courses-grid" id="courses-grid">
    <div class="spinner">Loading courses…</div>
  </div>
</main>

<!-- Toast container -->
<div id="toast-container"></div>

<!-- ── JavaScript ────────────────────────────────────────────── -->
<script>
  const API = 'http://localhost:5000/api/courses';
  let allCourses  = [];
  let activeFilter = 'All';

  // ── Helpers ───────────────────────────────────────────────

  function statusClass(status) {
    if (status === 'In Progress') return 'ip';
    if (status === 'Completed')   return 'done';
    return 'ns';
  }

  function badgeClass(status) {
    if (status === 'In Progress') return 'badge-ip';
    if (status === 'Completed')   return 'badge-done';
    return 'badge-ns';
  }

  function formatDate(iso) {
    if (!iso) return '—';
    // Handle both "YYYY-MM-DD" and full ISO strings
    const d = iso.length === 10 ? iso : iso.slice(0, 10);
    const [y, m, day] = d.split('-');
    return `${day}/${m}/${y}`;
  }

  function toast(msg, type = 'success') {
    const t = document.createElement('div');
    t.className = `toast toast-${type}`;
    t.textContent = msg;
    document.getElementById('toast-container').appendChild(t);
    setTimeout(() => t.remove(), 3000);
  }

  // ── Stats ─────────────────────────────────────────────────

  async function loadStats() {
    try {
      const res  = await fetch(`${API}/stats`);
      const data = await res.json();
      document.getElementById('stat-total').textContent = data.total;
      document.getElementById('stat-ns').textContent    = data.not_started;
      document.getElementById('stat-ip').textContent    = data.in_progress;
      document.getElementById('stat-done').textContent  = data.completed;
    } catch {
      // stats are non-critical; ignore silently
    }
  }

  // ── Load & render courses ──────────────────────────────────

  async function loadCourses() {
    document.getElementById('courses-grid').innerHTML = '<div class="spinner">Loading courses…</div>';
    try {
      const res  = await fetch(API);
      const data = await res.json();
      allCourses = data.courses || [];
      renderCourses();
    } catch (err) {
      document.getElementById('courses-grid').innerHTML =
        '<div class="empty-state"><div class="icon">⚠️</div><p>Cannot reach the API.<br>Make sure the backend is running on port 5000.</p></div>';
    }
  }

  function renderCourses() {
    const grid = document.getElementById('courses-grid');
    const list = activeFilter === 'All'
      ? allCourses
      : allCourses.filter(c => c.status === activeFilter);

    if (list.length === 0) {
      grid.innerHTML = '<div class="empty-state"><div class="icon">📭</div><p>No courses found.</p></div>';
      return;
    }

    grid.innerHTML = list.map(c => `
      <div class="course-card status-${statusClass(c.status)}" id="card-${c.id}">
        <div class="card-header">
          <h3>${escHtml(c.name)}</h3>
          <span class="badge ${badgeClass(c.status)}">${escHtml(c.status)}</span>
        </div>
        <p class="card-desc">${escHtml(c.description)}</p>
        <p class="card-meta"><strong>Target:</strong> ${formatDate(c.target_date)}</p>
        <div class="card-actions">
          <button class="btn-edit"   onclick="showEditForm(${c.id})">✏️ Edit</button>
          <button class="btn-delete" onclick="deleteCourse(${c.id}, '${escAttr(c.name)}')">🗑️ Delete</button>
        </div>
        <!-- Inline edit form (hidden by default) -->
        <div class="inline-edit" id="edit-${c.id}" style="display:none">
          <div>
            <label>Name</label>
            <input type="text" id="edit-name-${c.id}" value="${escAttr(c.name)}" />
          </div>
          <div>
            <label>Description</label>
            <textarea id="edit-desc-${c.id}" rows="2">${escHtml(c.description)}</textarea>
          </div>
          <div>
            <label>Target Date</label>
            <input type="date" id="edit-date-${c.id}" value="${c.target_date}" />
          </div>
          <div>
            <label>Status</label>
            <select id="edit-status-${c.id}">
              ${['Not Started','In Progress','Completed'].map(s =>
                `<option value="${s}" ${c.status === s ? 'selected' : ''}>${s}</option>`
              ).join('')}
            </select>
          </div>
          <div class="inline-edit-actions">
            <button class="btn-cancel" onclick="hideEditForm(${c.id})">Cancel</button>
            <button class="btn-save"   onclick="saveEdit(${c.id})">💾 Save</button>
          </div>
        </div>
      </div>
    `).join('');
  }

  // ── Security helpers ───────────────────────────────────────

  function escHtml(str) {
    return String(str)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;')
      .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
  function escAttr(str) { return escHtml(str); }

  // ── Filter ─────────────────────────────────────────────────

  function setFilter(btn) {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeFilter = btn.dataset.filter;
    renderCourses();
  }

  // ── Add course ─────────────────────────────────────────────

  document.getElementById('add-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('submit-btn');
    btn.disabled = true;
    btn.textContent = 'Adding…';

    const body = {
      name:        document.getElementById('f-name').value.trim(),
      description: document.getElementById('f-desc').value.trim(),
      target_date: document.getElementById('f-date').value,
      status:      document.getElementById('f-status').value
    };

    try {
      const res = await fetch(API, {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify(body)
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Failed to add course');
      toast(`"${data.name}" added!`);
      resetForm();
      await refresh();
    } catch (err) {
      toast(err.message, 'error');
    } finally {
      btn.disabled = false;
      btn.textContent = 'Add Course';
    }
  });

  function resetForm() {
    document.getElementById('add-form').reset();
  }

  // ── Inline edit ────────────────────────────────────────────

  function showEditForm(id) {
    document.getElementById(`edit-${id}`).style.display = 'flex';
    document.querySelector(`#card-${id} .card-actions`).style.display = 'none';
  }

  function hideEditForm(id) {
    document.getElementById(`edit-${id}`).style.display = 'none';
    document.querySelector(`#card-${id} .card-actions`).style.display = 'flex';
  }

  async function saveEdit(id) {
    const body = {
      name:        document.getElementById(`edit-name-${id}`).value.trim(),
      description: document.getElementById(`edit-desc-${id}`).value.trim(),
      target_date: document.getElementById(`edit-date-${id}`).value,
      status:      document.getElementById(`edit-status-${id}`).value
    };

    try {
      const res  = await fetch(`${API}/${id}`, {
        method:  'PUT',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify(body)
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Failed to update course');
      toast(`"${data.name}" updated!`);
      await refresh();
    } catch (err) {
      toast(err.message, 'error');
    }
  }

  // ── Delete course ──────────────────────────────────────────

  async function deleteCourse(id, name) {
    if (!confirm(`Delete "${name}"?\nThis cannot be undone.`)) return;

    try {
      const res  = await fetch(`${API}/${id}`, { method: 'DELETE' });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Failed to delete course');
      toast(`"${name}" deleted.`);
      await refresh();
    } catch (err) {
      toast(err.message, 'error');
    }
  }

  // ── Refresh both stats + courses ───────────────────────────

  async function refresh() {
    await Promise.all([loadStats(), loadCourses()]);
  }

  // ── Boot ───────────────────────────────────────────────────
  refresh();
</script>
</body>
</html>
